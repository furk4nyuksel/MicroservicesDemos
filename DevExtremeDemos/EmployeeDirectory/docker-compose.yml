version: '3.8'

services:
  elasticsearch:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    container_name: employee-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - employee-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: employee-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - employee-net

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: employee-api
    ports:
      - "5050:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ElasticSearch:Url=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - employee-net

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: employee-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - employee-net

volumes:
  es_data:
    driver: local

networks:
  employee-net:
    driver: bridge
